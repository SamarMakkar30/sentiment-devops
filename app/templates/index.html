<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentiment Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      margin-top: 10px;
      padding: 10px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    #result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 6px;
      font-size: 18px;
      display: none;
    }
    .positive { background: #dcfce7; color: #166534; }
    .negative { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1>Sentiment Analyzer</h1>
  <p>Type a sentence and find out if it's positive or negative.</p>
  <textarea id="text" placeholder="e.g. I love this product!"></textarea>
  <br>
  <button onclick="analyze()">Analyze</button>
  <div id="result"></div>

  <script>
    async function analyze() {
      const text = document.getElementById('text').value;
      if (!text.trim()) return alert('Please enter some text');

      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });

      const data = await res.json();
      const box = document.getElementById('result');
      box.style.display = 'block';
      box.className = data.sentiment;
      box.innerHTML = `
        <strong>${data.sentiment.toUpperCase()}</strong> — ${data.confidence}% confidence<br>
        <small>"${data.text}"</small>
      `;
    }
  </script>
</body>
</html>
