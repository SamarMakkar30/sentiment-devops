<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentiment Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0b1220;
      --muted: #475569;
      --accent: #0ea5e9;
      --accent-2: #f97316;
      --card: rgba(255, 255, 255, 0.9);
      --positive: #166534;
      --positive-bg: #dcfce7;
      --negative: #991b1b;
      --negative-bg: #fee2e2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Sora", sans-serif;
      color: var(--ink);
      background: #f7f4ef;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(254, 215, 170, 0.6), transparent 55%),
        radial-gradient(circle at 85% 10%, rgba(186, 230, 253, 0.6), transparent 50%),
        radial-gradient(circle at 75% 85%, rgba(196, 181, 253, 0.45), transparent 55%),
        linear-gradient(120deg, #f8fafc, #fff7ed);
      z-index: -2;
    }

    main {
      max-width: 760px;
      margin: 8vh auto;
      padding: 32px 34px 36px;
      background: var(--card);
      border-radius: 24px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(8px);
      animation: rise 0.6s ease both;
    }

    header {
      margin-bottom: 28px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 10px;
    }

    h1 {
      font-family: "Newsreader", serif;
      font-size: clamp(2.1rem, 3vw, 2.8rem);
      margin: 0 0 8px;
      color: var(--ink);
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .panel {
      display: grid;
      gap: 16px;
    }

    .label {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--ink);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px 16px;
      font-size: 1rem;
      border: 1px solid rgba(148, 163, 184, 0.5);
      border-radius: 14px;
      background: #ffffff;
      resize: vertical;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    button {
      padding: 12px 26px;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 30px rgba(14, 165, 233, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(14, 165, 233, 0.3);
    }

    .hint {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .result {
      display: none;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid transparent;
      font-size: 1.05rem;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .result.is-visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .result.positive {
      background: var(--positive-bg);
      color: var(--positive);
      border-color: rgba(22, 101, 52, 0.25);
    }

    .result.negative {
      background: var(--negative-bg);
      color: var(--negative);
      border-color: rgba(153, 27, 27, 0.25);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      main {
        margin: 6vh 16px;
        padding: 26px 22px 30px;
      }

      .controls {
        flex-direction: column;
        align-items: flex-start;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">Live sentiment check</p>
      <h1>Sentiment Analyzer</h1>
      <p class="sub">Type a sentence and get a positive or negative score in seconds.</p>
    </header>

    <section class="panel">
      <label class="label" for="text">Your sentence</label>
      <textarea id="text" placeholder="Example: I love this product!"></textarea>

      <div class="controls">
        <button onclick="analyze()">Analyze</button>
        <span class="hint">Tip: try "This is surprisingly good"</span>
      </div>

      <div id="result" class="result"></div>
    </section>
  </main>

  <script>
    async function analyze() {
      const text = document.getElementById("text").value;
      if (!text.trim()) {
        alert("Please enter some text");
        return;
      }

      const res = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      const data = await res.json();
      const box = document.getElementById("result");
      box.className = "result " + data.sentiment;
      box.classList.add("is-visible");
      box.innerHTML =
        "<strong>" + data.sentiment.toUpperCase() + "</strong> - " +
        data.confidence + "% confidence<br><small>\"" + data.text + "\"</small>";
    }
  </script>
</body>
</html>
